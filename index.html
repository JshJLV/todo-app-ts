<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Frontend Mentor | Todo app</title>
  </head>
  <body>
    <header class="header">
      <div class="header-nav">
        <h1 class="header--title">T O D O</h1>
        <button
          id="button-light-dark"
          class="button--light-dark"
          aria-label="Change theme"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="26"
            height="26"
            id="sun"
          >
            <path
              fill="#FFF"
              fill-rule="evenodd"
              d="M13 21a1 1 0 011 1v3a1 1 0 11-2 0v-3a1 1 0 011-1zm-5.657-2.343a1 1 0 010 1.414l-2.121 2.121a1 1 0 01-1.414-1.414l2.12-2.121a1 1 0 011.415 0zm12.728 0l2.121 2.121a1 1 0 01-1.414 1.414l-2.121-2.12a1 1 0 011.414-1.415zM13 8a5 5 0 110 10 5 5 0 010-10zm12 4a1 1 0 110 2h-3a1 1 0 110-2h3zM4 12a1 1 0 110 2H1a1 1 0 110-2h3zm18.192-8.192a1 1 0 010 1.414l-2.12 2.121a1 1 0 01-1.415-1.414l2.121-2.121a1 1 0 011.414 0zm-16.97 0l2.121 2.12A1 1 0 015.93 7.344L3.808 5.222a1 1 0 011.414-1.414zM13 0a1 1 0 011 1v3a1 1 0 11-2 0V1a1 1 0 011-1z"
            />
          </svg>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="26"
            height="26"
            id="moon"
          >
            <path
              fill="#FFF"
              fill-rule="evenodd"
              d="M13 0c.81 0 1.603.074 2.373.216C10.593 1.199 7 5.43 7 10.5 7 16.299 11.701 21 17.5 21c2.996 0 5.7-1.255 7.613-3.268C23.22 22.572 18.51 26 13 26 5.82 26 0 20.18 0 13S5.82 0 13 0z"
            />
          </svg>
        </button>
      </div>
    </header>
    <main class="main-container">
      <form id="form" class="form--inputs">
        <div class="wrapper-checkbox">
          <input type="checkbox" name="checkbox-task" id="checkbox-task" />
          <label for="checkbox-task" class="checkbox-label"></label>
        </div>
        <input
          type="text"
          id="input-task"
          name="task"
          placeholder="Create a new todo..."
        />
      </form>
      <section class="tasks">
        <div class="to-do-list"></div>
        <div class="main--footer">
          <p class="task--pending">
            <span id="counter-tasks">0</span> items left
          </p>
          <div id="filters" class="filters">
            <button id="all-filter" value="all" class="filters-button active">
              All
            </button>
            <button id="active-filter" value="active" class="filters-button">
              Active
            </button>
            <button
              id="completed-filter"
              value="completed"
              class="filters-button"
            >
              Completed
            </button>
          </div>
          <button id="clear-tasks" class="task--clear-btn">
            Clear Compleated
          </button>
        </div>
      </section>
    </main>
    <footer>
      <div class="attribution">
        <p>
          Challenge by
          <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">
            Frontend Mentor.</a
          >
        </p>
        <p>
          Coded by
          <a href="https://github.com/JshJLV" target="_blank">Joseph Lpz</a>.
        </p>
      </div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
