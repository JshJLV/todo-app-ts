<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Frontend Mentor | Todo app</title>
  </head>
  <body>
    <header class="header">
      <div class="header-nav">
        <h1 class="header--title">T O D O</h1>
        <button id="button-light-dark" class="button--light-dark">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26">
            <path
              fill="#FFF"
              fill-rule="evenodd"
              d="M13 0c.81 0 1.603.074 2.373.216C10.593 1.199 7 5.43 7 10.5 7 16.299 11.701 21 17.5 21c2.996 0 5.7-1.255 7.613-3.268C23.22 22.572 18.51 26 13 26 5.82 26 0 20.18 0 13S5.82 0 13 0z"
            />
          </svg>
        </button>
      </div>
    </header>
    <main class="main-container">
      <form id="form" class="form--inputs">
        <div class="wrapper-checkbox">
          <input type="checkbox" name="checkbox-task" id="checkbox-task" />
          <label for="checkbox-task" class="checkbox-label"></label>
        </div>
        <input type="text" id="input-task" placeholder="Create a new todo..." />
      </form>
      <section class="tasks">
        <div class="to-do-list">
          <div class="task">
            <div class="wrapper-checkbox">
              <input type="checkbox" name="task-1" id="task-1" />
              <label for="task-1" class="checkbox-label"></label>
            </div>
            <p id="task-content" class="task--content">Lorem ipsum dolor</p>
            <button id="delete-task" class="delete--task">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18">
                <path
                  fill="#494C6B"
                  fill-rule="evenodd"
                  d="M16.97 0l.708.707L9.546 8.84l8.132 8.132-.707.707-8.132-8.132-8.132 8.132L0 16.97l8.132-8.132L0 .707.707 0 8.84 8.132 16.971 0z"
                />
              </svg>
            </button>
          </div>
        </div>
        <div class="main--footer">
          <p class="task--pending">5 items left</p>
          <button id="clear-tasks" class="task--clear-btn">
            Clear Compleated
          </button>
        </div>
      </section>
      <div class="filters">
        <button id="all-filter" class="filters-button active">All</button>
        <button id="active-filter" class="filters-button">Active</button>
        <button id="completed-filter" class="filters-button">Completed</button>
      </div>
    </main>
    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">
          Frontend Mentor</a
        >. Coded by
        <a href="https://github.com/JshJLV" target="_blank">Joseph Lpz</a>.
      </div>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
